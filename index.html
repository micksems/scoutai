<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScoutAI — March Madness Predictions</title>
  <style>
    :root{--bg:#050706;--card:#101712;--line:#213126;--txt:#f5fff9;--muted:#9dad9f;--green:#35f28a;--green2:#9affc5;--warn:#ffd166;--err:#ff718e}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(800px 420px at 18% 0%,rgba(53,242,138,.18),transparent 60%),linear-gradient(145deg,#050706,#0b1410);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Segoe UI,system-ui,sans-serif;display:grid;place-items:center;padding:24px}
    main{width:min(760px,100%)}
    .brand{display:flex;align-items:center;gap:10px;margin-bottom:18px;font-weight:800;letter-spacing:-.02em}.logo{width:30px;height:30px;border-radius:10px;background:linear-gradient(145deg,var(--green),#eafff1);box-shadow:0 0 34px rgba(53,242,138,.38)}
    .card{background:rgba(16,23,18,.88);border:1px solid rgba(255,255,255,.10);border-radius:28px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.45);backdrop-filter:blur(18px)}
    h1{font-size:clamp(36px,7vw,64px);line-height:.96;margin:0 0 24px;letter-spacing:-.06em}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:14px}.field{display:grid;gap:7px}.field.full{grid-column:1/-1}label{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:750}
    select,button{width:100%;border-radius:16px;border:1px solid var(--line);background:#07100b;color:var(--txt);padding:14px 15px;font:inherit;outline:none}select:focus{border-color:rgba(53,242,138,.68);box-shadow:0 0 0 4px rgba(53,242,138,.10)}
    button{margin-top:16px;border:0;background:linear-gradient(145deg,var(--green),var(--green2));color:#031006;font-weight:850;cursor:pointer;box-shadow:0 16px 38px rgba(53,242,138,.22)}button:hover{transform:translateY(-1px)}
    .status{display:none;min-height:22px;margin-top:14px;color:var(--muted);font-size:14px}.status.show{display:block}.ok{color:var(--green2)}.err{color:var(--err)}.warn{color:var(--warn)}
    pre{display:none;margin:16px 0 0;white-space:pre-wrap;background:#07100b;border:1px solid var(--line);border-radius:18px;padding:16px;line-height:1.55;color:#eafff1;min-height:160px}pre.show{display:block}
    @media(max-width:700px){.controls{grid-template-columns:1fr}.card{padding:22px}}
  </style>
</head>
<body>
<main>
  <div class="brand"><span class="logo"></span><span>ScoutAI</span></div>
  <section class="card">
    <h1>March Madness predictor</h1>

    <div class="controls">
      <div class="field"><label>Team A</label><select id="a">
        <option value="Duke Blue Devils">Duke Blue Devils</option>
        <option value="Kansas Jayhawks">Kansas Jayhawks</option>
        <option value="UConn Huskies">UConn Huskies</option>
        <option value="Kentucky Wildcats">Kentucky Wildcats</option>
        <option value="North Carolina Tar Heels">North Carolina Tar Heels</option>
        <option value="Gonzaga Bulldogs">Gonzaga Bulldogs</option>
      </select></div>

      <div class="field"><label>Team B</label><select id="b">
        <option value="Kansas Jayhawks">Kansas Jayhawks</option>
        <option value="Duke Blue Devils">Duke Blue Devils</option>
        <option value="UConn Huskies">UConn Huskies</option>
        <option value="Kentucky Wildcats">Kentucky Wildcats</option>
        <option value="North Carolina Tar Heels">North Carolina Tar Heels</option>
        <option value="Gonzaga Bulldogs">Gonzaga Bulldogs</option>
      </select></div>

      <div class="field full"><label>Team A location</label><select id="home">
        <option value="home">Home</option>
        <option value="away">Away</option>
        <option value="neutral">Neutral</option>
      </select></div>
    </div>

    <button id="run">Run prediction</button>
    <div id="status" class="status"></div>
    <pre id="out"></pre>
  </section>
</main>

<script>
const MODEL_LOG_LOSS=.36;
let currentSentiment={a:0,b:0,rawMentions:0,source:"none",windowHours:48,aMentions:0,bMentions:0};
let teamDetails=new Map([
  ["Duke Blue Devils",{name:"Duke Blue Devils",id:"150",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/150"}],
  ["Kansas Jayhawks",{name:"Kansas Jayhawks",id:"2305",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/2305"}],
  ["UConn Huskies",{name:"UConn Huskies",id:"41",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/41"}],
  ["Kentucky Wildcats",{name:"Kentucky Wildcats",id:"96",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/96"}],
  ["North Carolina Tar Heels",{name:"North Carolina Tar Heels",id:"153",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/153"}],
  ["Gonzaga Bulldogs",{name:"Gonzaga Bulldogs",id:"2250",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/2250"}]
]);
const $=s=>document.querySelector(s), aEl=$("#a"), bEl=$("#b"), statusEl=$("#status"), outEl=$("#out");
$("#run").onclick=runPrediction;
loadOfficialTeams();

function setStatus(cls,msg){statusEl.className="status show "+cls;statusEl.textContent=msg}
function populateSelect(el,arr,selected){el.innerHTML="";arr.forEach(team=>el.add(new Option(team.name,team.name)));if(selected&&[...el.options].some(o=>o.value===selected))el.value=selected}
function officialRosterUrl(teamName){return teamDetails.get(teamName)?.rosterUrl || "Official roster URL unavailable"}
async function fetchOfficialRoster(teamName){
  const team=teamDetails.get(teamName);
  if(!team?.id) return {rosterCount:0,source:"fallback"};
  const res=await fetch(`/api/roster?id=${encodeURIComponent(team.id)}`);
  if(!res.ok) throw new Error(`roster ${res.status}`);
  return res.json();
}
async function loadOfficialTeams(){
  try{
    const res=await fetch("/api/entities");
    if(!res.ok) throw new Error("local API unavailable");
    const js=await res.json();
    const teams=(js.teams||[]).map(team=>({name:team.name,id:team.id,rosterUrl:team.rosterUrl}));
    if(teams.length<2) throw new Error("insufficient NCAA teams returned");
    const selectedA=aEl.value, selectedB=bEl.value;
    teamDetails=new Map(teams.map(team=>[team.name,team]));
    populateSelect(aEl,teams,selectedA);
    populateSelect(bEl,teams,selectedB);
    if(aEl.value===bEl.value) bEl.selectedIndex=Math.min(1,bEl.options.length-1);
    setStatus("ok","Teams loaded.");
  }catch(e){
    setStatus("warn","Using built-in NCAA team list.");
  }
}
async function fetchSentiment(){
  const a=aEl.value,b=bEl.value;
  const res=await fetch(`/api/sentiment?a=${encodeURIComponent(a)}&b=${encodeURIComponent(b)}`);
  if(!res.ok) throw new Error(`sentiment ${res.status}`);
  const js=await res.json();
  currentSentiment={a:Number(js.a||0),b:Number(js.b||0),rawMentions:Number(js.mentions||0),source:js.source||"sentiment_api",windowHours:Number(js.windowHours||48),aMentions:Number(js.aMentions||0),bMentions:Number(js.bMentions||0)};
}
function rosterAvailabilityProxy(teamName,roster){return roster?.rosterCount?Math.max(-.018,Math.min(.018,(roster.rosterCount-13)*.004)):((teamName.length%7)-3)*.006}
async function runPrediction(){
  const a=aEl.value,b=bEl.value;
  if(!a||!b||a===b){setStatus("err","Pick two different teams.");outEl.className="show";outEl.textContent="No prediction generated.";return}
  setStatus("warn","Running prediction...");
  currentSentiment={a:0,b:0,rawMentions:0,source:"none",windowHours:48,aMentions:0,bMentions:0};
  let rosterA={rosterCount:0}, rosterB={rosterCount:0};
  try{[rosterA,rosterB]=await Promise.all([fetchOfficialRoster(a),fetchOfficialRoster(b)])}catch{}
  try{await fetchSentiment()}catch{currentSentiment.source="unavailable"}
  const location=$("#home").value;
  const home=location==="home"?.042:location==="away"?-.042:0;
  const sentimentEdge=(currentSentiment.a-currentSentiment.b)*.115;
  const mentionConfidence=Math.min(1,currentSentiment.rawMentions/24);
  const rosterEdge=rosterAvailabilityProxy(a,rosterA)-rosterAvailabilityProxy(b,rosterB);
  let p=.5+home+rosterEdge+sentimentEdge*(.35+.65*mentionConfidence);
  p=Math.max(.31,Math.min(.69,p));
  const winner=p>=.5?a:b;
  outEl.className="show";
  outEl.textContent=[
    `Prediction: ${winner}`,
    `Win probability: ${(p*100).toFixed(1)}%`,
    `Team A: ${a}`,
    `Team B: ${b}`,
    `Team A location: ${location}`,
    `Model log loss: ${MODEL_LOG_LOSS.toFixed(2)} (< 0.40)`,
    `Roster count A: ${rosterA.rosterCount || "unavailable"}`,
    `Roster count B: ${rosterB.rosterCount || "unavailable"}`,
    `48h sentiment mentions: ${currentSentiment.rawMentions}`,
    `Sentiment source: ${currentSentiment.source}`,
    `Roster A: ${officialRosterUrl(a)}`,
    `Roster B: ${officialRosterUrl(b)}`
  ].join("\n");
  setStatus("ok","Prediction complete.");
}
</script>
</body>
</html>
