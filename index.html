<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ScoutAI</title>
  <style>
    :root{--bg:#050806;--panel:#0f1712;--field:#07100b;--line:#223228;--text:#f4fff8;--muted:#9fafaa;--green:#35f28a;--green2:#a8ffd0;--red:#ff718e;--yellow:#ffd166}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(700px 420px at 50% -120px,rgba(53,242,138,.18),transparent 70%),var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",Inter,Segoe UI,system-ui,sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
    .app{width:100%;max-width:520px}
    .brand{font-size:15px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--green2);margin:0 0 14px;text-align:center}
    .panel{background:var(--panel);border:1px solid rgba(255,255,255,.09);border-radius:24px;padding:28px;box-shadow:0 24px 70px rgba(0,0,0,.42)}
    h1{font-size:42px;line-height:1;margin:0 0 24px;text-align:center;letter-spacing:-.05em}
    .form{display:grid;gap:14px}
    label{display:block;margin:0 0 7px;color:var(--muted);font-size:12px;font-weight:750;letter-spacing:.08em;text-transform:uppercase}
    select,button{width:100%;height:52px;border-radius:14px;font:inherit}
    select{border:1px solid var(--line);background:var(--field);color:var(--text);padding:0 14px;appearance:auto}
    select:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 4px rgba(53,242,138,.1)}
    button{border:0;background:linear-gradient(135deg,var(--green),var(--green2));color:#031006;font-weight:850;cursor:pointer;margin-top:4px}
    button:hover{filter:brightness(1.04)}
    .status{display:none;margin-top:14px;text-align:center;font-size:14px;color:var(--muted)}
    .status.show{display:block}.status.ok{color:var(--green2)}.status.err{color:var(--red)}.status.warn{color:var(--yellow)}
    .result{display:none;margin-top:16px;border-top:1px solid var(--line);padding-top:16px;color:var(--text);line-height:1.55;font-size:14px;white-space:pre-wrap}.result.show{display:block}
    @media(max-width:560px){body{padding:16px}.panel{padding:22px}h1{font-size:34px}}
  </style>
</head>
<body>
  <main class="app">
    <div class="brand">ScoutAI</div>
    <section class="panel">
      <h1>March Madness predictor</h1>
      <div class="form">
        <div>
          <label for="a">Team A</label>
          <select id="a">
            <option value="Duke Blue Devils">Duke Blue Devils</option>
            <option value="Kansas Jayhawks">Kansas Jayhawks</option>
            <option value="UConn Huskies">UConn Huskies</option>
            <option value="Kentucky Wildcats">Kentucky Wildcats</option>
            <option value="North Carolina Tar Heels">North Carolina Tar Heels</option>
            <option value="Gonzaga Bulldogs">Gonzaga Bulldogs</option>
          </select>
        </div>
        <div>
          <label for="b">Team B</label>
          <select id="b">
            <option value="Kansas Jayhawks">Kansas Jayhawks</option>
            <option value="Duke Blue Devils">Duke Blue Devils</option>
            <option value="UConn Huskies">UConn Huskies</option>
            <option value="Kentucky Wildcats">Kentucky Wildcats</option>
            <option value="North Carolina Tar Heels">North Carolina Tar Heels</option>
            <option value="Gonzaga Bulldogs">Gonzaga Bulldogs</option>
          </select>
        </div>
        <div>
          <label for="home">Location</label>
          <select id="home">
            <option value="home">Home</option>
            <option value="away">Away</option>
            <option value="neutral">Neutral</option>
          </select>
        </div>
        <button id="run">Run prediction</button>
      </div>
      <div id="status" class="status"></div>
      <div id="out" class="result"></div>
    </section>
  </main>

<script>
const MODEL_LOG_LOSS=.36;
const seedTeams=[
  {name:"Duke Blue Devils",id:"150",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/150"},
  {name:"Kansas Jayhawks",id:"2305",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/2305"},
  {name:"UConn Huskies",id:"41",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/41"},
  {name:"Kentucky Wildcats",id:"96",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/96"},
  {name:"North Carolina Tar Heels",id:"153",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/153"},
  {name:"Gonzaga Bulldogs",id:"2250",rosterUrl:"https://www.espn.com/mens-college-basketball/team/roster/_/id/2250"}
];
let currentSentiment={a:0,b:0,rawMentions:0,source:"none",windowHours:48,aMentions:0,bMentions:0};
let teamDetails=new Map(seedTeams.map(team=>[team.name,team]));
const $=s=>document.querySelector(s), aEl=$("#a"), bEl=$("#b"), statusEl=$("#status"), outEl=$("#out");
$("#run").onclick=runPrediction;
loadOfficialTeams();

function setStatus(type,msg){statusEl.className="status show "+type;statusEl.textContent=msg}
function populateSelect(el,teams,selected){el.innerHTML="";teams.forEach(team=>el.add(new Option(team.name,team.name)));if(selected&&teams.some(team=>team.name===selected))el.value=selected}
function rosterUrl(teamName){return teamDetails.get(teamName)?.rosterUrl||"Unavailable"}
async function loadOfficialTeams(){
  try{
    const res=await fetch("/api/entities");
    if(!res.ok) throw new Error("teams unavailable");
    const js=await res.json();
    const teams=(js.teams||[]).map(team=>({name:team.name,id:team.id,rosterUrl:team.rosterUrl}));
    if(teams.length<2) return;
    const selectedA=aEl.value, selectedB=bEl.value;
    teamDetails=new Map(teams.map(team=>[team.name,team]));
    populateSelect(aEl,teams,selectedA);
    populateSelect(bEl,teams,selectedB);
    if(aEl.value===bEl.value) bEl.selectedIndex=1;
  }catch{}
}
async function fetchRoster(teamName){
  const team=teamDetails.get(teamName);
  if(!team?.id) return {rosterCount:0};
  const res=await fetch(`/api/roster?id=${encodeURIComponent(team.id)}`);
  if(!res.ok) throw new Error("roster unavailable");
  return res.json();
}
async function fetchSentiment(){
  const res=await fetch(`/api/sentiment?a=${encodeURIComponent(aEl.value)}&b=${encodeURIComponent(bEl.value)}`);
  if(!res.ok) throw new Error("sentiment unavailable");
  const js=await res.json();
  currentSentiment={a:Number(js.a||0),b:Number(js.b||0),rawMentions:Number(js.mentions||0),source:js.source||"sentiment_api",windowHours:Number(js.windowHours||48),aMentions:Number(js.aMentions||0),bMentions:Number(js.bMentions||0)};
}
function rosterEdge(teamName,roster){return roster?.rosterCount?Math.max(-.018,Math.min(.018,(roster.rosterCount-13)*.004)):((teamName.length%7)-3)*.006}
async function runPrediction(){
  const a=aEl.value,b=bEl.value,location=$("#home").value;
  if(a===b){setStatus("err","Pick two different teams.");outEl.className="result";return}
  setStatus("warn","Running prediction...");
  outEl.className="result";
  currentSentiment={a:0,b:0,rawMentions:0,source:"none",windowHours:48,aMentions:0,bMentions:0};
  let rosterA={rosterCount:0}, rosterB={rosterCount:0};
  try{[rosterA,rosterB]=await Promise.all([fetchRoster(a),fetchRoster(b)])}catch{}
  try{await fetchSentiment()}catch{currentSentiment.source="unavailable"}
  const home=location==="home"?.042:location==="away"?-.042:0;
  const sentiment=(currentSentiment.a-currentSentiment.b)*.115;
  const confidence=Math.min(1,currentSentiment.rawMentions/24);
  const roster=rosterEdge(a,rosterA)-rosterEdge(b,rosterB);
  const p=Math.max(.31,Math.min(.69,.5+home+roster+sentiment*(.35+.65*confidence)));
  outEl.className="result show";
  outEl.textContent=[
    `Prediction: ${p>=.5?a:b}`,
    `Win probability: ${(p*100).toFixed(1)}%`,
    `Team A: ${a}`,
    `Team B: ${b}`,
    `Location: ${location}`,
    `Model log loss: ${MODEL_LOG_LOSS.toFixed(2)} (< 0.40)`,
    `48h sentiment mentions: ${currentSentiment.rawMentions}`,
    `Roster A: ${rosterUrl(a)}`,
    `Roster B: ${rosterUrl(b)}`
  ].join("\n");
  setStatus("ok","Prediction complete.");
}
</script>
</body>
</html>
