<!doctype html><html><head><meta charset='utf-8'/><meta name='viewport' content='width=device-width,initial-scale=1'/><title>ScoutAI</title>
<style>body{font-family:Inter,Arial;background:#0b1020;color:#eef2ff;padding:20px}.card{background:#121a35;border:1px solid #33407a;border-radius:12px;padding:14px;margin-bottom:12px}select,button,textarea{width:100%;padding:10px;border-radius:8px;border:1px solid #3a4c84;background:#0d1736;color:#eef2ff}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ok{color:#72f7b2}.err{color:#ff718e}.warn{color:#ffd166}pre{white-space:pre-wrap}</style></head><body>
<div class='card'><h2>ScoutAI (Vercel-ready)</h2><p>NCAA Basketball, NFL, NBA, UFC. Live dropdowns via ScoutAI API routes.</p></div>
<div class='card'><div class='row'><div><label>Sport</label><select id='sport'></select></div><div><label>Home</label><select id='home'><option value='none'>Neutral</option><option value='a'>A</option><option value='b'>B</option></select></div></div>
<div class='row'><div><label>Entity A</label><select id='a'></select></div><div><label>Entity B</label><select id='b'></select></div></div>
<label>Manual text</label><textarea id='manual'></textarea><div class='row'><button id='load'>Refresh Entities</button><button id='sent'>Fetch Sentiment</button></div><button id='run'>Run Prediction</button><div id='status'></div></div>
<div class='card'><h3>Methods</h3><ul><li>API routes avoid browser CORS failures.</li><li>Reddit + historical fallback sentiment.</li><li>Lexicon+negation NLP and confidence-gated probability.</li></ul><pre id='out'>No prediction yet.</pre></div>
<script>
const SPORT_CFG={"NCAA Basketball":{key:'ncaa',sub:'collegebasketball'},"NFL":{key:'nfl',sub:'nfl'},"NBA":{key:'nba',sub:'nba'},"UFC":{key:'ufc',sub:'ufc'}};
let sent={a:0,b:0,mentions:0,source:'none'};const q=s=>document.querySelector(s);const sport=q('#sport'),a=q('#a'),b=q('#b');Object.keys(SPORT_CFG).forEach(s=>sport.add(new Option(s,s)));
q('#load').onclick=loadEntities;q('#sent').onclick=loadSent;q('#run').onclick=run;sport.onchange=loadEntities;loadEntities();
function status(c,m){q('#status').className=c;q('#status').textContent=m}
function fill(el,arr){el.innerHTML='';arr.forEach(x=>el.add(new Option(x,x)))}
async function loadEntities(){status('warn','Loading entities...');const key=SPORT_CFG[sport.value].key;const r=await fetch(`/api/entities?sport=${key}`);const js=await r.json();if(!r.ok){status('err',js.error||'failed');return;}fill(a,js.entities);fill(b,js.entities);b.selectedIndex=1;status('ok',`Loaded ${js.entities.length} entities`)}
async function loadSent(){if(!a.value||!b.value||a.value===b.value){status('err','Select two different entities');return;}status('warn','Loading sentiment...');const sub=SPORT_CFG[sport.value].sub;const u=`/api/sentiment?a=${encodeURIComponent(a.value)}&b=${encodeURIComponent(b.value)}&sub=${sub}`;const r=await fetch(u);const js=await r.json();if(!r.ok){status('err',js.error||'sentiment failed');return;}sent=js;status('ok',`Sentiment loaded (${js.source}), mentions ${js.mentions}`)}
function run(){if(!a.value||!b.value||a.value===b.value){status('err','Invalid entities');return;}const home=q('#home').value==='a'?0.04:q('#home').value==='b'?-0.04:0;const conf=Math.min(1,(sent.mentions||0)/20);let p=0.5+home+((sent.a||0)-(sent.b||0))*0.12*(0.35+0.65*conf);p=Math.max(0.33,Math.min(0.67,p));const w=p>=0.5?a.value:b.value;q('#out').textContent=`Sport: ${sport.value}\nA: ${a.value}\nB: ${b.value}\nWinner: ${w}\nWin Prob: ${(p*100).toFixed(1)}%\nSent Source: ${sent.source}\nMentions: ${sent.mentions}`;status('ok','Prediction complete');}
</script></body></html>
